        <title>Calendar</title>
        <script>
            (function () {
                try {
                    var cache = localStorage.getItem("calendar:cache");
                    var parsed = cache ? JSON.parse(cache) : null;
                    var theme = parsed ? parsed.theme || parsed.data?.theme || "system" : "system";
                    var isDark =
                        theme === "dark" ||
                        (theme === "system" &&
                            window.matchMedia("(prefers-color-scheme: dark)").matches);
                    document.documentElement.classList.toggle("dark", isDark);
                } catch (e) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>
