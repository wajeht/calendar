        <title>Calendar</title>
        <script>
            (function () {
                function normalizeTheme(value) {
                    return value === "light" || value === "dark" || value === "system"
                        ? value
                        : null;
                }

                function applyTheme(theme) {
                    var isDark =
                        theme === "dark" ||
                        (theme === "system" &&
                            window.matchMedia("(prefers-color-scheme: dark)").matches);
                    document.documentElement.classList.toggle("dark", isDark);
                    document.documentElement.style.colorScheme = isDark ? "dark" : "light";
                }

                try {
                    var storedTheme = normalizeTheme(localStorage.getItem("calendar:theme"));
                    var cache = localStorage.getItem("calendar:cache");
                    var parsed = cache ? JSON.parse(cache) : null;
                    var cachedTheme = parsed
                        ? normalizeTheme(parsed.theme) ||
                          normalizeTheme(parsed.data && parsed.data.theme)
                        : null;
                    applyTheme(storedTheme || cachedTheme || "system");
                } catch (e) {
                    applyTheme("system");
                }
            })();
        </script>
