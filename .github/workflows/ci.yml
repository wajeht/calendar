name: CI

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened, labeled, unlabeled, closed]

permissions:
    deployments: write

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Run Tests
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.action != 'unlabeled')
        runs-on: ubuntu-latest
        env:
            CI: true
        steps:
            - name: Check out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Vite+
              uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0

            - name: Install dependencies
              run: vp install

            - name: Build native modules
              run: npm rebuild better-sqlite3 --ignore-scripts=false

            - name: Verify package signatures
              run: npm audit signatures

            - name: Check (lint + format)
              run: vp check

            - name: Run tests
              run: vp test run

    build:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        name: Build Docker Image
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Login to Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./Dockerfile.prod
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        if: github.event_name == 'push'
        needs: ["test", "build"]
        name: Deploy
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/deploy.yaml@de3f1611b6b8cd6c766ae891f0302b76ce222774 # v0.0.21
        with:
            app-path: apps/calendar
            service-name: calendar
            tag: ${{ needs.build.outputs.tag }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-build:
        name: Temp Build
        if: >
            (github.event.action == 'labeled' && github.event.label.name == 'temp-deploy') ||
            (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'temp-deploy'))
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 1

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Login to Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./Dockerfile.prod
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    temp-deploy:
        name: Temp Deploy
        if: >
            (github.event.action == 'labeled' && github.event.label.name == 'temp-deploy') ||
            (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'temp-deploy'))
        needs: temp-build
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-deploy.yaml@de3f1611b6b8cd6c766ae891f0302b76ce222774 # v0.0.21
        with:
            app-path: apps/calendar
            service-name: calendar
            tag: ${{ needs.temp-build.outputs.tag }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-cleanup:
        name: Temp Cleanup
        if: >
            github.event.action == 'closed' ||
            (github.event.action == 'unlabeled' && github.event.label.name == 'temp-deploy')
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-cleanup.yaml@de3f1611b6b8cd6c766ae891f0302b76ce222774 # v0.0.21
        with:
            app-path: apps/calendar
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
